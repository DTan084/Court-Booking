version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: court-booking-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: court_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: court-booking-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (one-shot, run before backend) ──
  # Usage: docker compose run --rm migrate
  migrate:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: court-booking-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env.docker
    command:
      - node
      - -e
      - |
        const ds = require('./apps/backend/dist/database/data-source').default;
        ds.initialize()
          .then(() => ds.runMigrations())
          .then(() => { console.log('✅ Migrations done'); process.exit(0); })
          .catch(e => { console.error('❌ Migration failed:', e.message); process.exit(1); });
    # profiles:
    #   - migrate

    # ── Backend (NestJS) ──────────────────────────
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: court-booking-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env.docker
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend (Next.js) ────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    container_name: court-booking-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ../.env.docker
    environment:
      - PORT=3000

  # ── Nginx (Reverse Proxy) ────────────────────
  nginx:
    image: nginx:alpine
    container_name: court-booking-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:

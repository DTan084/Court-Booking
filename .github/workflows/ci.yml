name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Start Services for E2E
        run: |
          cp .env.example .env
          cp .env.example .env.docker
          cd infra && docker compose up -d postgres redis
          # Wait for DB to be ready
          for i in {1..10}; do docker exec court-booking-db pg_isready -U postgres && break || sleep 2; done

      - name: Run E2E Tests
        run: pnpm --filter @court-booking/backend run test:e2e

      - name: Build
        run: pnpm build

      - name: Build Docker Backend
        run: docker build -t court-booking-backend -f apps/backend/Dockerfile .

      - name: Build Docker Frontend
        run: docker build -t court-booking-frontend -f apps/frontend/Dockerfile .
